<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Emerald Green for the app theme
                        "danger": "#ef4444",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between p-4 sticky top-0 z-10 glass-effect mx-4 mt-4 rounded-xl shadow-sm">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-slate-200/50 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl">account_balance</span>
<h1 class="font-bold text-lg tracking-tight">Heritage</h1>
</div>
</div>
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-slate-200/50 rounded-full transition-colors">
<span class="material-symbols-outlined text-xl">dark_mode</span>
</button>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
<img class="w-full h-full object-cover" data-alt="User profile avatar close up" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOYVv1Y4Dfu0eLllxoSv0TES5EOWjSaMtXBh8fVj7oqtSqrb0Q38mMKN5i-61GIGYEBUg_tLgl8qaJPmJCJcycYSg6xOmkDIErZYElojGynXHR4-L4PFRoUK4DHQ9QpXhWR5E7t_upOLzLVxSuabsveOzer8HJl5L__Kui8HOQGgqDb_ki3-dpY3GUwGX7H71lMDPvTj6YlqhOA5iyuD4ZUoBY_QakC6SukuocDHNNE98jHv5SKxZuBROF9_bTE-NNor4jg1Vw04o"/>
</div>
</div>
</header>
<!-- Content Area -->
<main class="flex-1 px-6 py-8 flex flex-col items-center justify-center max-w-md mx-auto w-full">
<div class="w-20 h-20 bg-danger/10 text-danger rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-5xl">delete_forever</span>
</div>
<h2 class="text-2xl font-bold text-center mb-8 leading-tight">
            Deseja excluir esta transação familiar?
        </h2>
<!-- Transaction Card -->
<div class="w-full glass-effect p-5 rounded-2xl shadow-lg border-l-4 border-primary mb-6">
<div class="flex justify-between items-start">
<div class="flex flex-col gap-1">
<span class="text-[10px] font-bold tracking-widest text-primary uppercase bg-primary/10 px-2 py-0.5 rounded-full w-fit">
                        [FAMÍLIA]
                    </span>
<h3 class="text-xl font-bold mt-1">Supermercado</h3>
<p class="text-slate-500 text-sm">15 de Outubro, 2023</p>
</div>
<div class="text-right">
<p class="text-xl font-bold text-slate-900">R$ 150,00</p>
</div>
</div>
<div class="mt-4 rounded-xl overflow-hidden h-32 relative">
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent z-0"></div>
<img class="w-full h-full object-cover" data-alt="Grocery store shelves with fresh produce" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC74NyzmQTChplCf2vhNKUAIBrFxxj2zP4mxaGlQ7q2-Q5zlgJPk21zZqhUVOwIAuN2DQUMlwar6QjFNFkLnsVbnAnAUUxBYz6DBCEZqQPde1BdCBs2iKN2Ni0us6W8CGWxhsDwIZk67dUznjox6iPpzlL9CJW_ClsB8DpX3qnLY2eFavCEXSp4rOcNtTF7-f1Xm_TYxk-Zb2lm71NlhDHOT2kObBXJ4zhMrxm_JQshclGhZvus-L9tWhd7n8SnA8yh2KF58EVo3zE"/>
</div>
</div>
<!-- Warning Notice -->
<div class="flex items-start gap-3 bg-slate-100/80 p-4 rounded-xl mb-10 w-full">
<span class="material-symbols-outlined text-slate-500 text-xl">info</span>
<p class="text-sm text-slate-600 leading-relaxed">
                Esta transação permanecerá na lixeira por <span class="font-bold">30 dias</span> antes de ser excluída permanentemente.
            </p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 w-full">
<button class="w-full bg-danger text-white font-bold py-4 rounded-xl shadow-lg shadow-danger/20 hover:brightness-110 active:scale-[0.98] transition-all">
                Excluir Transação
            </button>
<button class="w-full bg-transparent text-slate-500 font-semibold py-4 rounded-xl hover:bg-slate-100 active:scale-[0.98] transition-all border border-slate-200">
                Cancelar
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="glass-effect mt-auto border-t border-slate-200/50 px-6 py-3 pb-8">
<div class="flex items-center justify-between relative max-w-lg mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium">Transações</span>
</a>
<!-- Floating Plus Button -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2">
<button class="w-14 h-14 bg-primary text-white rounded-full shadow-lg shadow-primary/40 flex items-center justify-center border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<div class="w-12"></div> <!-- Spacer for floating button -->
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">flag</span>
<span class="text-[10px] font-medium">Metas</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">auto_awesome</span>
<span class="text-[10px] font-bold">IA</span>
</a>
</div>
</nav>
</body></html>
