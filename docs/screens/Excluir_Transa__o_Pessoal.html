<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Emerald green as requested
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                        "danger": "#ef4444",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container -->
<div class="relative flex h-screen max-w-md mx-auto flex-col overflow-hidden shadow-2xl bg-slate-50">
<!-- Header -->
<header class="flex items-center justify-between p-4 bg-white/50 backdrop-blur-md sticky top-0 z-10">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined text-slate-700">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="text-2xl">🏛️</span>
<h1 class="text-lg font-bold tracking-tight text-slate-800">Heritage</h1>
</div>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined text-slate-600">dark_mode</span>
</button>
<div class="size-9 rounded-full bg-primary/20 overflow-hidden border-2 border-primary/30">
<img alt="Profile avatar" data-alt="User profile photo avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwUrR0D44ST6anruZZQgdnZb8JS0MZrWESqNUPgTzrxjkkM5mwpPmx8MWv-BJx0SwV5CWKJcj5bx4mBKuAOOHG2ZxLI97sJdUYcz0c9uhJgc-DhaNSZQjEtTwq3-IX6S3ri9fahbcyzVINj_I-TSdvwK7u8c97kuZEemNR-PfPa6YujyrZmbj-gjKYzPeiqL8nIIFeyodKIyJs8kTEZvEMUAOvyThHjSOYphgyYVeNNAkqiD3-rbY8UZaWfLUTDcmLEmuKTIXAGmE"/>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-6 py-8 flex flex-col items-center">
<div class="w-full max-w-sm">
<!-- Warning Icon -->
<div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-red-100 mb-6">
<span class="material-symbols-outlined text-red-500 text-4xl">delete_forever</span>
</div>
<!-- Confirmation Title -->
<h2 class="text-2xl font-bold text-center text-slate-900 mb-2">Deseja excluir esta transação?</h2>
<p class="text-center text-slate-500 text-sm mb-8 px-4">Esta transação permanecerá na lixeira por 30 dias antes de ser excluída permanentemente.</p>
<!-- Transaction Details Card (Glassmorphism) -->
<div class="glass rounded-xl p-5 mb-10 shadow-sm border border-slate-200/60">
<div class="flex justify-between items-start mb-4">
<div>
<span class="inline-block px-2 py-1 rounded-md bg-primary/10 text-primary text-[10px] font-bold tracking-wider mb-2">PESSOAL</span>
<h3 class="text-lg font-bold text-slate-800">Supermercado</h3>
<p class="text-slate-500 text-sm">15 de Outubro, 2023</p>
</div>
<div class="text-right">
<p class="text-xl font-bold text-slate-900">R$ 150,00</p>
</div>
</div>
<div class="w-full h-32 rounded-lg overflow-hidden relative">
<img alt="Grocery store interior" class="w-full h-full object-cover" data-alt="Blurred grocery store interior background pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfnSh0jtxPcgnDd7zBDfunfdyvzwmXakKFrPKpqOV6IhO-MvWLn7iKvPA7X_JlXhamsdAcCkyK_BkmZtSGpmXzSaCdTPosd-80Dvt9p5PGz_b3JIrOrTNy2uqqogYqqV1Cb_GOvjqe7BgDjIAPP7jIsdSTyY2f5nTxXYBzX_igMyPBNRXg3fUWi8KGoHVS0MtiWA8Y01c-uP2OR2ri3-0cvbQg3DMopdtb6nvP6OtWh0VkhJzqVFCX18XP5AkBUhf0xYI4aOcxJ6s"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-200 transition-all active:scale-95">
                        Excluir Transação
                    </button>
<button class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-4 rounded-xl transition-all">
                        Cancelar
                    </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-white/80 backdrop-blur-lg border-t border-slate-200 px-6 pt-2 pb-6 flex items-center justify-between relative">
<a class="flex flex-col items-center gap-1 text-slate-400 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">home</span>
<span class="text-[10px] font-medium">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">receipt_long</span>
<span class="text-[10px] font-medium">Transações</span>
</a>
<!-- Center Floating Button -->
<div class="relative -top-8">
<button class="size-14 rounded-full bg-primary flex items-center justify-center text-white shadow-xl shadow-primary/40 border-4 border-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">flag</span>
<span class="text-[10px] font-medium">Metas</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">auto_awesome</span>
<span class="text-[10px] font-medium">IA</span>
</a>
</nav>
</div>
</body></html>
